name: Collect SK Hynix prices

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Fetch prices
        run: python3 fetch_prices.py

      - name: Commit snapshot
        run: |
          git config user.name "price-bot"
          git config user.email "actions@github.com"
          git add docs/data/history.json
          if git diff --cached --quiet; then
            echo "no change"
            exit 0
          fi
          git commit -m "chore: snapshot $(date -u +'%Y-%m-%d %H:%M') UTC"
          git pull --rebase --autostash
          git push
